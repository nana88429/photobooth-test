<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐洲全運會2026 人生四格</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 { margin-bottom: 20px; letter-spacing: 2px; text-align: center; }

        .main-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* 左側相機控制區 */
        .camera-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .video-container {
            position: relative;
            width: 360px;
            height: 540px;
            background-color: #000;
            border: 4px solid #ffffff;
            border-radius: 12px;
            overflow: hidden;
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            display: none;
            z-index: 10;
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            width: 80%;
        }
        button:active { transform: scale(0.95); }
        #start-btn { background-color: #ffffff; color: #1a1a1a; }
        #capture-btn { background-color: #ff3366; color: #ffffff; }
        #capture-btn:disabled { background-color: #555555; color: #aaaaaa; cursor: not-allowed; }
        #download-btn { background-color: #00cc66; color: #ffffff; display: none; }

        /* 右側主畫面預覽區 */
        .result-box { display: flex; flex-direction: column; align-items: center; }

        .photo-strip {
            position: relative;
            width: 300px;
            height: 903px; 
            background-image: url('frame1.png');
            background-size: 100% 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 預覽格子的絕對定位 */
        .photo-slot {
            position: absolute;
            width: 74.67%;   
            height: 17.5%;   
            left: 12.67%;    
            overflow: hidden;
            background-color: transparent;
        }

        #slot-0 { top: 16.95%; }
        #slot-1 { top: 35.33%; }
        #slot-2 { top: 53.71%; }
        #slot-3 { top: 72.10%; }

        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }

        /* 🔥 儲存專用彈出層（重新設計：絕不走位結構） */
        .download-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
            padding: 20px 10px;
            box-sizing: border-box;
            overflow-y: auto; /* 允許手機上下滑動看完整截圖 */
        }
        
        .modal-content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        /* 彈出層專用的外框：直接與主畫面脫離，確保手機縮放不崩潰 */
        .modal-photo-strip {
            position: relative;
            width: 280px;
            height: 843px; /* 稍微縮小一點點，確保手機畫面能一眼看全 */
            background-image: url('frame1.png');
            background-size: 100% 100%;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
        }

        /* 彈出層專用的四個格子定位（精確鎖定） */
        .modal-slot {
            position: absolute;
            width: 74.67%;
            height: 17.5%;
            left: 12.67%;
            overflow: hidden;
        }
        #modal-slot-0 { top: 16.95%; }
        #modal-slot-1 { top: 35.33%; }
        #modal-slot-2 { top: 53.71%; }
        #modal-slot-3 { top: 72.10%; }
        .modal-slot img { width: 100%; height: 100%; object-fit: cover; }

        .close-modal-btn {
            background: #ff3366; color: white; border: none; 
            padding: 12px 50px; border-radius: 25px; cursor: pointer; font-weight: bold;
            font-size: 16px; margin: 15px 0 30px 0;
        }
    </style>
</head>
<body>

    <h1>歐洲全運會2026 人生四格</h1>

    <div class="main-layout">
        <div class="camera-box">
            <div class="video-container">
                <video id="webcam" autoplay playsinline></video>
                <div id="countdown" class="countdown-overlay">1</div>
            </div>

            <div class="control-panel">
                <button id="start-btn">開啟相機</button>
                <button id="capture-btn" disabled>開始連拍 4 張</button>
                <button id="download-btn">🚀 生成專屬人生四格</button>
            </div>
        </div>

        <div class="result-box">
            <div class="photo-strip" id="main-strip">
                <div class="photo-slot" id="slot-0"></div>
                <div class="photo-slot" id="slot-1"></div>
                <div class="photo-slot" id="slot-2"></div>
                <div class="photo-slot" id="slot-3"></div>
            </div>
        </div>
    </div>

    <div id="downloadModal" class="download-modal">
        <div class="modal-content-wrapper">
            <p style="color: #ffcc00; font-size: 15px; font-weight: bold; margin: 0; text-align: center; line-height: 1.5; padding: 0 10px;">
                🎉 四格相片已完美生成！<br>📸 請直接【螢幕截圖】保存最完美的畫面！
            </p>
            
            <div class="modal-photo-strip" id="modal-strip">
                <div class="modal-slot" id="modal-slot-0"></div>
                <div class="modal-slot" id="modal-slot-1"></div>
                <div class="modal-slot" id="modal-slot-2"></div>
                <div class="modal-slot" id="modal-slot-3"></div>
            </div>

            <button class="close-modal-btn" onclick="closeModal()">返回修改</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('start-btn');
        const captureBtn = document.getElementById('capture-btn');
        const downloadBtn = document.getElementById('download-btn');
        const countdownEl = document.getElementById('countdown');
        const downloadModal = document.getElementById('downloadModal');
        
        let currentStream = null;
        let capturedDataUrls = [];

        window.closeModal = function() {
            downloadModal.style.display = 'none';
        }

        // 開啟相機
        startBtn.addEventListener('click', async () => {
            try {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = currentStream;
                startBtn.style.display = 'none';
                captureBtn.disabled = false;
            } catch (err) { alert('相機啟動失敗：' + err); }
        });

        // ⚡ 連拍邏輯：這次確實鎖定 1 秒倒數！
        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            downloadBtn.style.display = 'none';
            capturedDataUrls = [];

            // 清空主預覽和彈出層的所有格子
            for (let s = 0; s < 4; s++) {
                document.getElementById(`slot-${s}`).innerHTML = '';
                document.getElementById(`modal-slot-${s}`).innerHTML = '';
            }

            // 確實執行 1 秒倒數
            for (let i = 0; i < 4; i++) {
                countdownEl.innerText = "1";
                countdownEl.style.display = 'block';
                await new Promise(res => setTimeout(res, 1000)); // 倒數 1 秒
                
                countdownEl.style.display = 'none';
                snapAndFill(i);
                
                // 每張拍完後的等待間隔也縮短到 0.8 秒，加快整體測試速度
                await new Promise(res => setTimeout(res, 800));
            }
            captureBtn.disabled = false;
            downloadBtn.style.display = 'block';
        });

        function snapAndFill(index) {
            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;

            ctx.translate(tempCanvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);

            const dataUrl = tempCanvas.toDataURL('image/jpeg');
            capturedDataUrls.push(dataUrl);

            // 塞入主畫面預覽
            const imgEl = document.createElement('img');
            imgEl.src = dataUrl;
            document.getElementById(`slot-${index}`).appendChild(imgEl);
        }

        // 🚀 點擊生成：將 4 張實體照片精確拷貝到彈出層對應的位置
        downloadBtn.addEventListener('click', () => {
            if (capturedDataUrls.length < 4) return;
            
            // 強制遍歷 1 到 4 張照片，一個蘿蔔一個坑填進去
            for (let idx = 0; idx < 4; idx++) {
                const modalSlot = document.getElementById(`modal-slot-${idx}`);
                modalSlot.innerHTML = ''; // 確保乾淨
                
                const imgModal = document.createElement('img');
                imgModal.src = capturedDataUrls[idx];
                modalSlot.appendChild(imgModal);
            }

            // 顯示彈出視窗
            downloadModal.style.display = 'flex';
        });
    </script>
</body>
</html>
