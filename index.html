<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐洲全運會2026 人生四格</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 { margin-bottom: 20px; letter-spacing: 2px; text-align: center; }

        .main-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* 左側相機控制區 */
        .camera-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .video-container {
            position: relative;
            width: 360px;
            height: 540px;
            background-color: #000;
            border: 4px solid #ffffff;
            border-radius: 12px;
            overflow: hidden;
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            display: none;
            z-index: 10;
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            width: 80%;
        }
        button:active { transform: scale(0.95); }
        #start-btn { background-color: #ffffff; color: #1a1a1a; }
        #capture-btn { background-color: #ff3366; color: #ffffff; }
        #capture-btn:disabled { background-color: #555555; color: #aaaaaa; cursor: not-allowed; }
        #download-btn { background-color: #00cc66; color: #ffffff; display: none; }

        /* 右側四格預覽區 */
        .result-box { display: flex; flex-direction: column; align-items: center; }

        .photo-strip {
            position: relative;
            width: 300px;
            height: 903px; 
            background-image: url('frame1.png');
            background-size: 100% 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 網頁預覽格子位置 */
        .photo-slot {
            position: absolute;
            width: 74.67%;   
            height: 17.5%;   
            left: 12.67%;    
            overflow: hidden;
            background-color: transparent;
        }

        #slot-0 { top: 16.95%; }
        #slot-1 { top: 35.33%; }
        #slot-2 { top: 53.71%; }
        #slot-3 { top: 72.10%; }

        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }

        #hidden-canvas { display: none; }

        /* 儲存專用彈出全螢罩 */
        .download-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .download-modal img {
            max-height: 75vh;
            max-width: 100%;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
            border: 2px solid #ffffff;
            border-radius: 6px;
        }
        .close-modal-btn {
            background: #ff3366; color: white; border: none; 
            padding: 12px 40px; border-radius: 25px; cursor: pointer; font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>歐洲全運會2026 人生四格</h1>

    <div class="main-layout">
        <div class="camera-box">
            <div class="video-container">
                <video id="webcam" autoplay playsinline></video>
                <div id="countdown" class="countdown-overlay">3</div>
            </div>

            <div class="control-panel">
                <button id="start-btn">開啟相機</button>
                <button id="capture-btn" disabled>開始連拍 4 張</button>
                <button id="download-btn">💾 產生手機下載/儲存圖片</button>
            </div>
        </div>

        <div class="result-box">
            <div class="photo-strip">
                <div class="photo-slot" id="slot-0"></div>
                <div class="photo-slot" id="slot-1"></div>
                <div class="photo-slot" id="slot-2"></div>
                <div class="photo-slot" id="slot-3"></div>
            </div>
        </div>
    </div>

    <div id="downloadModal" class="download-modal">
        <p style="color: #ffcc00; font-size: 16px; font-weight: bold; margin: 0; text-align: center; line-height: 1.5;">
            ✨ 四格相片已完美打包（含相框）！<br>【手機用戶】請直接「長按圖片」點選儲存即可！
        </p>
        <img id="modalImage" src="" alt="您的完整人生四格照片">
        <button class="close-modal-btn" onclick="closeModal()">返回修改</button>
    </div>

    <canvas id="hidden-canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('start-btn');
        const captureBtn = document.getElementById('capture-btn');
        const downloadBtn = document.getElementById('download-btn');
        const countdownEl = document.getElementById('countdown');
        const downloadModal = document.getElementById('downloadModal');
        const modalImage = document.getElementById('modalImage');
        
        let currentStream = null;
        let capturedDataUrls = [];
        const frameSrc = 'frame1.png'; // 直接讀取妳倉庫裡的操場相框圖

        window.closeModal = function() {
            downloadModal.style.display = 'none';
        }

        // 開啟相機
        startBtn.addEventListener('click', async () => {
            try {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = currentStream;
                startBtn.style.display = 'none';
                captureBtn.disabled = false;
            } catch (err) { alert('相機啟動失敗：' + err); }
        });

        // 連拍邏輯
        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            downloadBtn.style.display = 'none';
            capturedDataUrls = [];

            for (let s = 0; s < 4; s++) document.getElementById(`slot-${s}`).innerHTML = '';

            for (let i = 0; i < 4; i++) {
                for (let count = 3; count > 0; count--) {
                    countdownEl.innerText = count;
                    countdownEl.style.display = 'block';
                    await new Promise(res => setTimeout(res, 1000));
                }
                countdownEl.style.display = 'none';
                snapAndFill(i);
                await new Promise(res => setTimeout(res, 1500));
            }
            captureBtn.disabled = false;
            downloadBtn.style.display = 'block';
        });

        function snapAndFill(index) {
            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;

            ctx.translate(tempCanvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);

            const dataUrl = tempCanvas.toDataURL('image/jpeg');
            capturedDataUrls.push(dataUrl);

            const imgEl = document.createElement('img');
            imgEl.src = dataUrl;
            document.getElementById(`slot-${index}`).appendChild(imgEl);
        }

        // 💾 讀取真正的 frame1.png 並在最上層覆蓋融合
        downloadBtn.addEventListener('click', () => {
            if (capturedDataUrls.length < 4) return;

            const canvas = document.getElementById('hidden-canvas');
            const ctx = canvas.getContext('2d');
            const frameImg = new Image();
            
            // 🔥【關鍵安全性解鎖】：解鎖跨域限制，允許 GitHub Pages 安全讀取同資料夾圖片
            frameImg.crossOrigin = 'anonymous';
            frameImg.src = frameSrc;
            
            frameImg.onload = () => {
                // 將輸出畫布設定為與妳原圖 frame1.png 完全一模一樣的高解析度
                canvas.width = frameImg.width;
                canvas.height = frameImg.height;

                // 完美的校園場館風位置比例參數
                const slotW = frameImg.width * 0.7467;
                const slotH = frameImg.height * 0.175;
                const startX = frameImg.width * 0.1267;
                const startYFactors = [0.1695, 0.3533, 0.5371, 0.7210];

                let imagesLoaded = 0;
                
                // 1. 先把拍好的 4 張照片按順序塞在最底層
                capturedDataUrls.forEach((dataUrl, i) => {
                    const img = new Image();
                    img.src = dataUrl;
                    img.onload = () => {
                        ctx.drawImage(img, startX, frameImg.height * startYFactors[i], slotW, slotH);
                        imagesLoaded++;

                        // 2. 當 4 張照片全部就位，把真正的「操場相框」完美覆蓋在最上層！
                        if (imagesLoaded === 4) {
                            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

                            // 3. 導出 100% 包含完整漂亮操場相框的人生四格單一圖檔
                            const finalImageFile = canvas.toDataURL('image/png');
                            
                            // 將帶有漂亮操場邊框的圖片傳給彈出層展示
                            modalImage.src = finalImageFile;
                            downloadModal.style.display = 'flex';

                            // 電腦端自動下載作為便利輔助
                            const autoLink = document.createElement('a');
                            autoLink.download = `TSESE_4Grid_${Date.now()}.png`;
                            autoLink.href = finalImageFile;
                            autoLink.click();
                        }
                    };
                });
            };
        });
    </script>
</body>
</html>
