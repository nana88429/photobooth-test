<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>歐洲全運會2026 人生四格</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; }
        .video-container { width: 360px; height: 540px; border: 4px solid white; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; display: none; }
        button { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 20px; border: none; }
        #capture-btn { background: #ff3366; color: white; }
        #download-btn { background: #00cc66; color: white; display: none; }
    </style>
</head>
<body>
    <h1>歐洲全運會2026 人生四格</h1>
    <div class="video-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="countdown" class="countdown">1</div>
    </div>
    <button id="start-btn">開啟相機</button>
    <button id="capture-btn" disabled>開始連拍 4 張</button>
    <button id="download-btn">產生並自動下載</button>
    
    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam'), startBtn = document.getElementById('start-btn'), captureBtn = document.getElementById('capture-btn'), downloadBtn = document.getElementById('download-btn'), countdown = document.getElementById('countdown');
        let stream = null, photos = [];

        startBtn.onclick = async () => {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            startBtn.style.display = 'none';
            captureBtn.disabled = false;
        };

        captureBtn.onclick = async () => {
            photos = [];
            captureBtn.disabled = true;
            for(let i=0; i<4; i++) {
                countdown.style.display = 'block';
                await new Promise(r => setTimeout(r, 1000));
                countdown.style.display = 'none';
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0);
                photos.push(canvas.toDataURL('image/jpeg'));
            }
            captureBtn.disabled = false;
            downloadBtn.style.display = 'inline-block';
        };

        downloadBtn.onclick = () => {
            const canvas = document.getElementById('hidden-canvas');
            const ctx = canvas.getContext('2d');
            const frame = new Image();
            frame.crossOrigin = "anonymous";
            frame.src = 'frame1.png?t=' + Date.now();
            frame.onload = () => {
                canvas.width = frame.width; canvas.height = frame.height;
                ctx.drawImage(frame, 0, 0);
                const positions = [[12.67, 16.95], [12.67, 35.33], [12.67, 53.71], [12.67, 72.10]];
                photos.forEach((src, i) => {
                    const img = new Image();
                    img.src = src;
                    img.onload = () => ctx.drawImage(img, canvas.width*(positions[i][0]/100), canvas.height*(positions[i][1]/100), canvas.width*0.7467, canvas.height*0.175);
                });
                // 延遲確保圖片渲染完畢
                setTimeout(() => {
                    const data = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = 'TSESE_Result.png';
                    link.href = data;
                    link.click();
                }, 500);
            };
        };
    </script>
</body>
</html>
