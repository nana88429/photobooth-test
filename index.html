<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐洲全運會2026 人生四格</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 { margin-bottom: 20px; letter-spacing: 2px; text-align: center; }

        .main-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* 左側相機控制區 */
        .camera-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .video-container {
            position: relative;
            width: 360px;
            height: 540px;
            background-color: #000;
            border: 4px solid #ffffff;
            border-radius: 12px;
            overflow: hidden;
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            display: none;
            z-index: 10;
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            width: 80%;
        }
        button:active { transform: scale(0.95); }
        #start-btn { background-color: #ffffff; color: #1a1a1a; }
        #capture-btn { background-color: #ff3366; color: #ffffff; }
        #capture-btn:disabled { background-color: #555555; color: #aaaaaa; cursor: not-allowed; }
        #download-btn { background-color: #00cc66; color: #ffffff; display: none; }

        /* 右側四格預覽區 */
        .result-box { display: flex; flex-direction: column; align-items: center; }

        .photo-strip {
            position: relative;
            width: 300px;
            height: 903px; 
            background-image: url('frame1.png');
            background-size: 100% 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 預覽格子位置 */
        .photo-slot {
            position: absolute;
            width: 74.67%;   
            height: 17.5%;   
            left: 12.67%;    
            overflow: hidden;
            background-color: transparent;
        }

        #slot-0 { top: 16.95%; }
        #slot-1 { top: 35.33%; }
        #slot-2 { top: 53.71%; }
        #slot-3 { top: 72.10%; }

        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }

        #hidden-canvas { display: none; }

        /* 儲存專用彈出全螢幕遮罩 */
        .download-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* 融合了實體邊框的單一圖檔 */
        .download-modal img {
            max-height: 75vh;
            max-width: 100%;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
            border: 2px solid #ffffff;
            border-radius: 6px;
        }
        .close-modal-btn {
            background: #ff3366; color: white; border: none; 
            padding: 12px 40px; border-radius: 25px; cursor: pointer; font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>歐洲全運會2026 人生四格</h1>

    <div class="main-layout">
        <div class="camera-box">
            <div class="video-container">
                <video id="webcam" autoplay playsinline></video>
                <div id="countdown" class="countdown-overlay">3</div>
            </div>

            <div class="control-panel">
                <button id="start-btn">開啟相機</button>
                <button id="capture-btn" disabled>開始連拍 4 張</button>
                <button id="download-btn">💾 產生手機下載/儲存圖片</button>
            </div>
        </div>

        <div class="result-box">
            <div class="photo-strip">
                <div class="photo-slot" id="slot-0"></div>
                <div class="photo-slot" id="slot-1"></div>
                <div class="photo-slot" id="slot-2"></div>
                <div class="photo-slot" id="slot-3"></div>
            </div>
        </div>
    </div>

    <div id="downloadModal" class="download-modal">
        <p style="color: #ffcc00; font-size: 16px; font-weight: bold; margin: 0; text-align: center; line-height: 1.5;">
            ✨ 四格相片已完美打包（含相框）！<br>【手機用戶】請直接「長按圖片」點選儲存即可！
        </p>
        <img id="modalImage" src="" alt="您的完整人生四格照片">
        <button class="close-modal-btn" onclick="closeModal()">返回修改</button>
    </div>

    <canvas id="hidden-canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('start-btn');
        const captureBtn = document.getElementById('capture-btn');
        const downloadBtn = document.getElementById('download-btn');
        const countdownEl = document.getElementById('countdown');
        const downloadModal = document.getElementById('downloadModal');
        const modalImage = document.getElementById('modalImage');
        
        let currentStream = null;
        let capturedDataUrls = [];

        // 🖼️ 核心魔法：將妳的 frame1.png 轉換為 100% 安全的 Base64 內嵌碼（已為妳精準壓縮轉換）
        const frameBase64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAlgAAAM3CAYAAADwO8vIAAAgAElEQVR4Xu3de5BcZZ3H8ee8T89k7mRuyYVwEwIigly8gYgCAnK7uLgshSgL7iqg6wK7XmC7uLp6gV2v7gV29YV1vSgXvCAsCgKCCwKyXETeEwIkkMncZub09PnUOTVpAsmcmclM9/T09/vVT6VSDX36eT7P7/P0Z6anu88p8YEAAQIECBAgQGCfAsX+/B69gBAgQIECAAAECbSogwNo0R8shESBAgAABAgT2V0CAtb9iXk+AAAECBAgQYFMCgZpXo2atPZ83g/8i9PZg6y7uAgIECBAgQIAAgZYE2gKsHh/F/f0zBFYtHQYHIUCAAAECBAgMioAAa1AcKcdJgAABAgQIEGhLgACrrSgOBgECBAgQIEBgUAQEWIPlSDlOAgQIECBAgEBbAgRYbUVxMAgQIECAAAECCwSqtY7Muvv7bO0/R0fEAgIECBAgQIAAgR4REGD1yIFwGgQIECBAgACBlgXqA6xaez7T7n39n/X9YwEBAgQIECBAgECPCQiwevjoOXYCBAgQIECAQEsC9R+Iqv9YwD8WtHQQHIQAAQIECBAgMEgCAqxBcZQcJwECBAgQIECgLQECrLaiOBgECBAgQIEBgUESEGANiqPkOAkQIECAAAECbQkQYLUbxeuDAIGWBYZ8hKGlfXAQAgQI9KGAAKsPD7pTJvDYBa73B6vfe7mYAAECBAYsIMAasAPm8Aj0ioAAq1eOhNMgsMIEBFgr7IDfD7ZWYAncCgECBAj8h4AAi4MDAQI9JiDA6rED4XQI9KzA4wKsWnve+T/re9WWeXMIDInAYN69HJL6dBwECPRH4PEBVv0fa/Y56Aeo/v6YfSZAgEC7BIZzhE6Xy+EgCBCYuIAAa+KmvJEAAQIECBAgMFUCvRdgDe9Inapt3CwBAgQIbIBAvR9gDYC9T7wBbC9PJUCAAAECEQX6O8Ai8XmZAAECbSvw+M+OalA/8LYb1wERINA9AQHW7ll6JAECBAgQIEBgFwQEWLsA6SEEBLonIMDaPUtPInC6AnU9vO47XUrP+28BAZaHAwECHRMQYHUEV+8vLsDqvbPhlAhMmYAAa8pIvcETBLpDYDhvsh6gLpceBAECBAjMEBBgcWgg0GMCg3mTVY/RYwPD6RCYoIAAa4KwvJoAAQIECBAgMF0CtfYM2eZ/z9XbK4fBIWhaX8/n6e0v1O8H/9b6Oftv69vX948FBAgQIECgswICrM766p0ECBAgQIAAgYkKXOD6Yv0vAr7A9cUW9vX9YwEBAgQIEOisgACrs756bxeBtvaCdmHYXyU+CBAgsGoFBFiRjvYvI/X2VfO/I36R+X6RAAECBDoqIMDqKK/eTYAAAQIECBCYqECw1jH71Vb7vNrfC4ZorXOPvI/EBAgQIEBgmAUEWMP86DlzAgQIECBAoK8FAlXb/t/79/fX9u97v087gPZ+3yMeEyBAgACBvhAQYPXFMfZEArMWhPsh+M8ZAgQIEOhGAQHWbtZ6LAECBAgQIEBgpIAACwwCBAgQIECAAIEmBeoDLD9wX/DAnfT9fTf07U9wVBAgQIDAsAgIsIblkXLOBGYI+GFCBwUCBLpRQIDVK8fSX4p75Ug4DQJ9JyDA6rtD7sQJpAsIsNJvghMgMGACAqwBPpA9P7T3Inr+oDghAv0vIMDq/zPuDAl8VCDY6uBBgEB3CQiwusdZTyKwqgV8L6+VfbyvWv/mX9UCnUAnApxfCcLySgIECBAgQIDAtAgI7qZFM86bEGyN0+W9BAi0TkCAtY6wGv9u+s0f0p6mX/+Lq7Z5HwECBDoqIMDqKK/eTYAAAQIECBCYqEAt9uC9/zN7X1vvefXfW0CAAAECBDolIMDqlKzeS+BhAV9AOEAIEIDAFgEBFAEEBAgQIECAAIEmBAK1jtlnvd/Xv78/         // 關閉彈出預覽
        window.closeModal = function() {
            downloadModal.style.display = 'none';
        }

        // 開啟相機
        startBtn.addEventListener('click', async () => {
            try {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = currentStream;
                startBtn.style.display = 'none';
                captureBtn.disabled = false;
            } catch (err) { alert('相機啟動失敗：' + err); }
        });

        // 連拍邏輯
        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            downloadBtn.style.display = 'none';
            capturedDataUrls = [];

            for (let s = 0; s < 4; s++) document.getElementById(`slot-${s}`).innerHTML = '';

            for (let i = 0; i < 4; i++) {
                for (let count = 3; count > 0; count--) {
                    countdownEl.innerText = count;
                    countdownEl.style.display = 'block';
                    await new Promise(res => setTimeout(res, 1000));
                }
                countdownEl.style.display = 'none';
                snapAndFill(i);
                await new Promise(res => setTimeout(res, 1500));
            }
            captureBtn.disabled = false;
            downloadBtn.style.display = 'block';
        });

        function snapAndFill(index) {
            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;

            ctx.translate(tempCanvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);

            const dataUrl = tempCanvas.toDataURL('image/jpeg');
            capturedDataUrls.push(dataUrl);

            const imgEl = document.createElement('img');
            imgEl.src = dataUrl;
            document.getElementById(`slot-${index}`).appendChild(imgEl);
        }

        // 💾 【終極修正版】將照片完美的塞進內嵌相框底下，導出真正包含相框的實體圖檔
        downloadBtn.addEventListener('click', () => {
            if (capturedDataUrls.length < 4) return;

            const canvas = document.getElementById('hidden-canvas');
            const ctx = canvas.getContext('2d');
            const frameImg = new Image();
            
            // 直接讀取內嵌的完整相框數據（100% 免疫安全死鎖）
            frameImg.src = frameBase64;
            
            frameImg.onload = () => {
                // 將輸出畫布設定為與原圖相同的高解析度
                canvas.width = frameImg.width;
                canvas.height = frameImg.height;

                // 精確的校園場館風坐標參數
                const slotW = frameImg.width * 0.7467;
                const slotH = frameImg.height * 0.175;
                const startX = frameImg.width * 0.1267;
                const startYFactors = [0.1695, 0.3533, 0.5371, 0.7210];

                let imagesLoaded = 0;
                
                // 遍歷 4 張照片繪製到最底層
                capturedDataUrls.forEach((dataUrl, i) => {
                    const img = new Image();
                    img.src = dataUrl;
                    img.onload = () => {
                        ctx.drawImage(img, startX, frameImg.height * startYFactors[i], slotW, slotH);
                        imagesLoaded++;

                        // 當 4 張照片全部在底層就位後，把真正的相框蓋在最上層！
                        if (imagesLoaded === 4) {
                            // 將真正的相框圖壓上去（灰色方塊會擋住並貼合照片）
                            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

                            // 導出 100% 包含完整相框與照片的「真・單一圖片檔案」
                            const finalImageFile = canvas.toDataURL('image/png');
                            
                            // 將完整的單一圖片傳給彈出層
                            modalImage.src = finalImageFile;
                            downloadModal.style.display = 'flex';

                            // 電腦端自動下載
                            const autoLink = document.createElement('a');
                            autoLink.download = `TSESE_4Grid_${Date.now()}.png`;
                            autoLink.href = finalImageFile;
                            autoLink.click();
                        }
                    };
                });
            };
        });
    </script>
</body>
</html>
