<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐洲全運會2026 人生四格</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 { margin-bottom: 20px; letter-spacing: 2px; text-align: center; }

        .main-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* 左側相機控制區 */
        .camera-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .video-container {
            position: relative;
            width: 360px;
            height: 540px;
            background-color: #000;
            border: 4px solid #ffffff;
            border-radius: 12px;
            overflow: hidden;
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            display: none;
            z-index: 10;
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            width: 80%;
        }
        button:active { transform: scale(0.95); }
        #start-btn { background-color: #ffffff; color: #1a1a1a; }
        #capture-btn { background-color: #ff3366; color: #ffffff; }
        #capture-btn:disabled { background-color: #555555; color: #aaaaaa; cursor: not-allowed; }
        #download-btn { background-color: #00cc66; color: #ffffff; display: none; }

        /* 右側四格網頁預覽區 */
        .result-box { display: flex; flex-direction: column; align-items: center; }

        .photo-strip {
            position: relative;
            width: 300px;
            height: 903px; 
            background-image: url('frame1.png');
            background-size: 100% 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .photo-slot {
            position: absolute;
            width: 74.67%;   
            height: 17.5%;   
            left: 12.67%;    
            overflow: hidden;
            background-color: transparent;
        }

        #slot-0 { top: 16.95%; }
        #slot-1 { top: 35.33%; }
        #slot-2 { top: 53.71%; }
        #slot-3 { top: 72.10%; }

        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }

        #hidden-canvas { display: none; }

        /* ✨ 儲存專用彈出層（修正為真正合成圖展示） */
        .download-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
            padding: 20px 10px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        
        /* 實體圖片展示，100% 支援手機長按儲存 */
        .download-modal img {
            max-height: 72vh;
            max-width: 100%;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
            border: 2px solid #ffffff;
            border-radius: 6px;
            margin-top: 5px;
        }
        .close-modal-btn {
            background: #ff3366; color: white; border: none; 
            padding: 12px 40px; border-radius: 25px; cursor: pointer; font-weight: bold;
            font-size: 16px; margin: 15px 0 35px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>歐洲全運會2026 人生四格</h1>

    <div class="main-layout">
        <div class="camera-box">
            <div class="video-container">
                <video id="webcam" autoplay playsinline></video>
                <div id="countdown" class="countdown-overlay">1</div>
            </div>

            <div class="control-panel">
                <button id="start-btn">開啟相機</button>
                <button id="capture-btn" disabled>開始連拍 4 張</button>
                <button id="download-btn">🚀 產生手機下載/儲存圖片</button>
            </div>
        </div>

        <div class="result-box">
            <div class="photo-strip">
                <div class="photo-slot" id="slot-0"></div>
                <div class="photo-slot" id="slot-1"></div>
                <div class="photo-slot" id="slot-2"></div>
                <div class="photo-slot" id="slot-3"></div>
            </div>
        </div>
    </div>

    <div id="downloadModal" class="download-modal">
        <p id="loading-text" style="color: #ffcc00; font-weight: bold; font-size: 16px; margin: 10px 0;">✨ 圖片打包融合中，請稍候...</p>
        <p id="save-tip" style="color: #ffcc00; font-size: 16px; font-weight: bold; margin: 10px 0; text-align: center; line-height: 1.5; display: none;">
            🎉 四格相片已完美打包（含相框）！<br>【手機用戶】請直接「長按圖片」點選儲存即可！
        </p>
        <img id="modalImage" src="" alt="您的完整人生四格照片" style="display: none;">
        <button class="close-modal-btn" onclick="closeModal()">返回修改</button>
    </div>

    <canvas id="hidden-canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('start-btn');
        const captureBtn = document.getElementById('capture-btn');
        const downloadBtn = document.getElementById('download-btn');
        const countdownEl = document.getElementById('countdown');
        const downloadModal = document.getElementById('downloadModal');
        const modalImage = document.getElementById('modalImage');
        const loadingText = document.getElementById('loading-text');
        const saveTip = document.getElementById('save-tip');
        
        let currentStream = null;
        let capturedDataUrls = [];
        const frameSrc = 'frame1.png'; // 妳的運動會專屬相框

        window.closeModal = function() {
            downloadModal.style.display = 'none';
        }

        // 開啟相機
        startBtn.addEventListener('click', async () => {
            try {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = currentStream;
                startBtn.style.display = 'none';
                captureBtn.disabled = false;
            } catch (err) { alert('相機啟動失敗：' + err); }
        });

        // ⚡ 連拍邏輯：確實鎖定 1 秒倒數！
        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            downloadBtn.style.display = 'none';
            capturedDataUrls = [];

            for (let s = 0; s < 4; s++) document.getElementById(`slot-${s}`).innerHTML = '';

            for (let i = 0; i < 4; i++) {
                countdownEl.innerText = "1";
                countdownEl.style.display = 'block';
                await new Promise(res => setTimeout(res, 1000)); // 倒數 1 秒
                
                countdownEl.style.display = 'none';
                snapAndFill(i);
                await new Promise(res => setTimeout(res, 800)); // 拍完停頓
            }
            captureBtn.disabled = false;
            downloadBtn.style.display = 'block';
        });

        function snapAndFill(index) {
            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;

            ctx.translate(tempCanvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);

            const dataUrl = tempCanvas.toDataURL('image/jpeg');
            capturedDataUrls.push(dataUrl);

            const imgEl = document.createElement('img');
            imgEl.src = dataUrl;
            document.getElementById(`slot-${index}`).appendChild(imgEl);
        }

        // 🚀【強大融合】：結合舊版手繪高解析度畫布 + 新版 frame1.png 相框解鎖
        downloadBtn.addEventListener('click', () => {
            if (capturedDataUrls.length < 4) return;

            // 打開遮罩，重置顯示狀態
            downloadModal.style.display = 'flex';
            modalImage.style.display = 'none';
            loadingText.style.display = 'block';
            saveTip.style.display = 'none';

            const canvas = document.getElementById('hidden-canvas');
            const ctx = canvas.getContext('2d');
            
            const frameImg = new Image();
            // 🌟 核心破局點：強制解鎖跨域並加上時間戳，繞過所有手機瀏覽器安全性限制
            frameImg.crossOrigin = 'Anonymous';
            frameImg.src = frameSrc + "?t=" + new Date().getTime();

            frameImg.onload = () => {
                // 使用高清標準四格比例輸出
                canvas.width = 600;
                canvas.height = 1806;

                // 精確的格子像素坐標參數
                const slotW = canvas.width * 0.7467;
                const slotH = canvas.height * 0.175;
                const startX = canvas.width * 0.1267;
                const startYFactors = [0.1695, 0.3533, 0.5371, 0.7210];

                let imagesLoaded = 0;

                // 先把 4 張照片畫入畫布底層
                capturedDataUrls.forEach((dataUrl, i) => {
                    const img = new Image();
                    img.src = dataUrl;
                    img.onload = () => {
                        const currentY = canvas.height * startYFactors[i];
                        ctx.drawImage(img, startX, currentY, slotW, slotH);
                        imagesLoaded++;

                        // 當 4 張照片都畫好，最後把專屬邊框 frame1.png 完美蓋在最上層！
                        if (imagesLoaded === 4) {
                            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
                            
                            // 導出 100% 實體圖片檔 (PNG Base64)
                            const finalImageFile = canvas.toDataURL('image/png');
                            
                            // 將成果塞入彈出層的 <img> 標籤
                            modalImage.src = finalImageFile;
                            
                            // 隱藏讀取，顯示完美大圖與提示
                            loadingText.style.display = 'none';
                            modalImage.style.display = 'block';
                            saveTip.style.display = 'block';

                            // 電腦用戶自動觸發下載檔案
                            const autoLink = document.createElement('a');
                            autoLink.download = `TSESE_4Grid_${Date.now()}.png`;
                            autoLink.href = finalImageFile;
                            autoLink.click();
                        }
                    };
                });
            };

            frameImg.onerror = () => {
                alert("錯誤：專屬相框 frame1.png 載入失敗，請確認圖片檔名正確且在同一個 GitHub 倉庫中！");
                closeModal();
            };
        });
    </script>
</body>
</html>
